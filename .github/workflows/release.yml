name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  QT_VERSION: '6.11.1'
  # aqtinstall 3.3.0 (PyPI) fails on Qt 6.11+ repo layout; use master until next release.
  AQT_SOURCE: 'git+https://github.com/miurahr/aqtinstall.git@master'

jobs:
  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "artifact=SonarPractice-${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Patch CMake version
        run: bash scripts/ci/set_version.sh "${{ steps.version.outputs.value }}"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config patchelf libfuse2 \
            librubberband-dev libavformat-dev libavutil-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: gcc_64
          modules: qtmultimedia qtshadertools qtsvg
          aqtsource: ${{ env.AQT_SOURCE }}
          cache: true
          cache-key-prefix: sonarpractice-qt611

      - name: Download linuxdeploy tools
        run: |
          mkdir -p .ci
          curl -fsSL -o .ci/linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -fsSL -o .ci/linuxdeploy-plugin-qt-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x .ci/*.AppImage
          echo "PATH=${PWD}/.ci:${PATH}" >> "$GITHUB_ENV"

      - name: Build AppImage
        run: bash scripts/ci/build_appimage.sh "${{ steps.version.outputs.value }}"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.artifact }}-linux
          path: ${{ steps.version.outputs.artifact }}.AppImage
          if-no-files-found: error

  build-windows:
    name: Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "artifact=SonarPractice-${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Patch CMake version
        shell: pwsh
        run: ./scripts/ci/set_version.ps1 -Version "${{ steps.version.outputs.value }}"

      - name: Install Qt (MinGW)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_mingw
          modules: qtmultimedia qtshadertools qtsvg
          tools: mingw1310_64
          aqtsource: ${{ env.AQT_SOURCE }}
          cache: true
          cache-key-prefix: sonarpractice-qt611

      - name: Configure and build
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}" \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DBUILD_TESTING=OFF
          cmake --build build --target SonarPractice

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          ./scripts/ci/deploy_windows.ps1 `
            -Version "${{ steps.version.outputs.value }}" `
            -BuildDir "${{ github.workspace }}\build" `
            -QtBinDir "${env:QT_ROOT_DIR}\bin"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.artifact }}-windows
          path: SonarPractice-${{ steps.version.outputs.value }}_Setup.exe
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten release files
        run: |
          find dist -type f \( -name '*.AppImage' -o -name '*.exe' \) -exec cp {} dist/ \;
          ls -la dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SonarPractice ${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: |
            dist/*.AppImage
            dist/*.exe
